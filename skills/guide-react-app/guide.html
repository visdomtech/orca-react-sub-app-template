<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orca Sub-App Creator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 64px;
    }

    .header { text-align: center; margin-bottom: 28px; }
    .header .logo { font-size: 1.6rem; font-weight: 800; color: #a78bfa; letter-spacing: -0.02em; }
    .header .subtitle { color: #475569; font-size: 0.875rem; margin-top: 6px; }

    .dots { display: flex; gap: 10px; margin-bottom: 28px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; background: #1e2030; border: 1.5px solid #2d2d44; transition: all 0.25s; }
    .dot.done { background: #7c3aed; border-color: #7c3aed; }
    .dot.current { background: #a78bfa; border-color: #a78bfa; box-shadow: 0 0 0 3px rgba(167,139,250,0.25); }

    .card {
      background: #13131f;
      border: 1px solid #1e2030;
      border-radius: 16px;
      padding: 36px 40px;
      width: 100%;
      max-width: 620px;
    }

    .step-label {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em;
      text-transform: uppercase; color: #7c3aed; margin-bottom: 10px;
    }
    .step-title { font-size: 1.55rem; font-weight: 800; color: #f1f5f9; margin-bottom: 12px; line-height: 1.2; }
    .step-text { color: #94a3b8; line-height: 1.7; font-size: 0.95rem; margin-bottom: 24px; }
    .step-text strong { color: #cbd5e1; font-weight: 600; }

    label { display: block; font-size: 0.8rem; font-weight: 600; color: #94a3b8; margin-bottom: 6px; letter-spacing: 0.02em; }
    input[type=text], textarea {
      width: 100%; padding: 12px 14px;
      background: #0a0a14; border: 1.5px solid #1e2030; border-radius: 8px;
      color: #f1f5f9; font-size: 0.95rem; font-family: inherit;
      transition: border-color 0.15s; margin-bottom: 18px;
    }
    input[type=text]:focus, textarea:focus { outline: none; border-color: #7c3aed; }
    textarea { resize: vertical; min-height: 160px; }

    .cmd-block {
      background: #0a0a14; border: 1px solid #1e2030;
      border-radius: 10px; padding: 16px 20px 16px;
      margin-bottom: 14px; position: relative;
    }
    .cmd-header { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: #334155; margin-bottom: 8px; }
    .cmd-text { font-family: 'Courier New', monospace; font-size: 0.875rem; color: #818cf8; line-height: 1.6; }
    .copy-btn {
      position: absolute; top: 12px; right: 12px;
      background: #1e2030; border: none; color: #64748b;
      font-size: 0.7rem; padding: 4px 10px; border-radius: 6px;
      cursor: pointer; letter-spacing: 0.04em;
    }
    .copy-btn:hover { background: #2d2d44; color: #e2e8f0; }

    .notice {
      background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.25);
      border-radius: 8px; padding: 12px 16px; margin-bottom: 24px;
      font-size: 0.875rem; color: #a78bfa; line-height: 1.5;
    }
    .notice strong { font-weight: 700; }

    table { width: 100%; border-collapse: collapse; margin-bottom: 24px; font-size: 0.875rem; }
    th { background: #0a0a14; color: #475569; font-weight: 600; padding: 9px 14px; text-align: left; border: 1px solid #1e2030; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 10px 14px; border: 1px solid #1e2030; color: #cbd5e1; }
    td.val { color: #818cf8; font-family: monospace; font-size: 0.875rem; }

    .btn-row { display: flex; gap: 10px; margin-top: 4px; }
    .btn-primary {
      flex: 1; padding: 14px 20px; background: #7c3aed; color: white;
      border: none; border-radius: 10px; font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: background 0.15s; letter-spacing: 0.01em;
    }
    .btn-primary:hover { background: #6d28d9; }
    .btn-back {
      padding: 14px 20px; background: transparent; color: #64748b;
      border: 1.5px solid #1e2030; border-radius: 10px; font-size: 0.95rem;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-back:hover { border-color: #2d2d44; color: #e2e8f0; }

    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #7c3aed; color: white; padding: 11px 22px; border-radius: 10px;
      font-size: 0.875rem; font-weight: 600; opacity: 0;
      transition: opacity 0.25s; pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }

    .complete-icon { font-size: 3.5rem; text-align: center; margin-bottom: 20px; }
    .complete-title { font-size: 1.7rem; font-weight: 800; color: #f1f5f9; text-align: center; margin-bottom: 12px; }
    .complete-text { color: #64748b; text-align: center; line-height: 1.75; font-size: 0.95rem; margin-bottom: 28px; }
    .complete-text strong { color: #a78bfa; }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">🐋 Orca</div>
  <div class="subtitle">Sub-App Creator — let's build something great</div>
</div>

<div class="dots" id="dots"></div>
<div class="card" id="card"></div>
<div class="toast" id="toast"></div>

<script>
const STEPS = [
  {
    label: "Step 1 of 6",
    title: "What do you want to build?",
    text: "Give your app a short name and describe what it should do. Claude takes care of everything after that — no coding needed.",
    type: "form",
  },
  {
    label: "Step 2 of 6",
    title: "Check your tools",
    text: "<strong>Claude runs this for you.</strong> It checks whether Git and Bun are installed — and installs either one automatically if it's missing. Usually takes under a minute.",
    type: "auto",
    command: "git --version && bun --version",
  },
  {
    label: "Step 3 of 6",
    title: "Download the template",
    text: "<strong>Claude runs this for you.</strong> It downloads the Orca sub-app starting template and installs its dependencies. Usually takes 15–30 seconds.",
    type: "auto",
    command: "git clone https://github.com/visdomtech/orca-react-sub-app-template.git {name}\ncd {name} && bun install",
  },
  {
    label: "Step 4 of 6",
    title: "Build your app",
    text: "<strong>Claude runs this for you.</strong> It packages everything into a single file that Orca can load, then saves a <strong>deployment zip</strong> to your Desktop so you can upload it to a remote server later. Takes 10–20 seconds.",
    type: "auto",
    command: "cd {name} && bun run build",
  },
  {
    label: "Step 5 of 6",
    title: "Start your app",
    text: "<strong>Claude runs this for you.</strong> It starts a local server so Orca can find your app. Keep the terminal window open — closing it stops the app.",
    type: "auto",
    command: "cd {name} && bunx serve dist --cors -l 4174",
  },
  {
    label: "Step 6 of 6",
    title: "Add your app to Orca",
    text: "Go to Orca → <strong>Settings → Apps → Add App</strong>, fill in the table below, click Save, then press <strong>Ctrl+Shift+R</strong> to reload.",
    type: "table",
  },
];

let current = 0;
let appName = "";
let appDescription = "";

function toTitle(s) {
  return s.split("-").map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(" ");
}
function sub(text) {
  return text.replace(/\{name\}/g, appName);
}

function renderDots() {
  document.getElementById("dots").innerHTML = STEPS.map((_, i) => {
    const c = i < current ? "done" : i === current ? "current" : "";
    return `<div class="dot ${c}"></div>`;
  }).join("");
}

function render() {
  const step = STEPS[current];
  const card = document.getElementById("card");

  if (step.type === "form") {
    card.innerHTML = `
      <div class="step-label">${step.label}</div>
      <div class="step-title">${step.title}</div>
      <div class="step-text">${step.text}</div>
      <label>App name <span style="color:#334155;font-weight:400">(no spaces — e.g. leave-tracker)</span></label>
      <input type="text" id="nameInput" placeholder="my-orca-app" />
      <label>What should it do?</label>
      <textarea id="descInput" placeholder="e.g. A checklist for new employees to complete their onboarding tasks.">${appDescription}</textarea>
      <div class="btn-row">
        <button class="btn-primary" onclick="startBuild()">Next →</button>
      </div>
    `;
    document.getElementById("nameInput").addEventListener("input", e => {
      appName = e.target.value.trim().replace(/\s+/g, "-").toLowerCase() || "my-orca-app";
    });
    document.getElementById("descInput").addEventListener("input", e => {
      appDescription = e.target.value.trim();
    });

  } else if (step.type === "auto") {
    const cmd = sub(step.command);
    card.innerHTML = `
      <div class="step-label">${step.label}</div>
      <div class="step-title">${step.title}</div>
      <div class="step-text">${step.text}</div>
      <div class="notice">✦ You don't need to open a terminal — <strong>Claude handles this step automatically.</strong></div>
      <div class="cmd-block">
        <div class="cmd-header">Command Claude runs</div>
        <button class="copy-btn" onclick="copyText('${cmd.replace(/'/g, "\\'").replace(/\n/g, "\\n")}')">copy</button>
        <div class="cmd-text">${cmd.replace(/\n/g, "<br>")}</div>
      </div>
      <div class="btn-row">
        <button class="btn-back" onclick="go(${current - 1})">← Back</button>
        <button class="btn-primary" onclick="go(${current + 1})">Next →</button>
      </div>
    `;

  } else if (step.type === "table") {
    card.innerHTML = `
      <div class="step-label">${step.label}</div>
      <div class="step-title">${step.title}</div>
      <div class="step-text">${step.text}</div>
      <table>
        <tr><th>Field</th><th>Value</th></tr>
        <tr><td>Remote URL</td><td class="val">http://localhost:4174/app.js</td></tr>
        <tr><td>Exposed Module</td><td class="val">./OrcaApp</td></tr>
        <tr><td>Route</td><td class="val">/orca/${appName}</td></tr>
        <tr><td>Title</td><td class="val">${toTitle(appName)}</td></tr>
        <tr><td>Icon ID</td><td class="val">apps</td></tr>
        <tr><td>Icon Background</td><td class="val">bg-indigo-500</td></tr>
      </table>
      <div class="btn-row">
        <button class="btn-back" onclick="go(${current - 1})">← Back</button>
        <button class="btn-primary" onclick="finish()">I've added it — Done 🎉</button>
      </div>
    `;
  }

  renderDots();
}

function startBuild() {
  const nameEl = document.getElementById("nameInput");
  const descEl = document.getElementById("descInput");
  appName = (nameEl?.value || "").trim().replace(/\s+/g, "-").toLowerCase() || "my-orca-app";
  appDescription = descEl?.value?.trim() || "";
  const msg = `/guide-react-app\nApp name: ${appName}\nWhat it does: ${appDescription || "(to be described)"}`;
  sendPrompt(msg);
  go(1);
}

function go(n) {
  if (n >= 0 && n < STEPS.length) { current = n; render(); }
}

function finish() {
  document.getElementById("dots").innerHTML = STEPS.map(() => '<div class="dot done"></div>').join("");
  document.getElementById("card").innerHTML = `
    <div class="complete-icon">🎉</div>
    <div class="complete-title">Your app is live in Orca!</div>
    <div class="complete-text">
      Open Orca and go to <strong>/orca/${appName}</strong> to see it.<br><br>
      To deploy remotely, find <strong>${appName}.zip</strong> on your Desktop —
      upload it to your server, extract the <code style="background:#1e2030;padding:2px 6px;border-radius:4px;font-size:0.85em">dist/</code> folder,
      and serve <code style="background:#1e2030;padding:2px 6px;border-radius:4px;font-size:0.85em">app.js</code> with CORS enabled.
      Then update the Remote URL in Orca to point to your server.<br><br>
      Keep the terminal window Claude opened running —<br>closing it stops the local server.
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="location.reload()">Build another app</button>
    </div>
  `;
}

function copyText(text) {
  const str = text.replace(/\\n/g, "\n");
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(str).then(() => showToast("Copied!")).catch(() => showToast("Copy failed."));
    } else {
      showToast("Copy not available.");
    }
  } catch(e) {
    showToast("Copy not available.");
  }
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

render();
</script>
</body>
</html>
